services:
  - type: web
    name: moodtunes-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python ../model/train_model.py"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    rootDir: backend
